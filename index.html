<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>That Bleach Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Shrikhand&family=Kalam:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <!-- ÉCRAN TITRE -->
  <section id="screen-title" class="screen active">
    <div class="bg-lines" aria-hidden="true">
      <div class="impact-line"></div><div class="impact-line"></div>
      <div class="impact-line"></div><div class="impact-line"></div>
      <div class="impact-line"></div>
    </div>
    <div class="title-content">
      <div class="title-logo-wrap">
        <div class="logo-that">THAT</div>
        <div class="logo-bleach">BLEACH</div>
        <div class="logo-quiz">QUIZ</div>
      </div>
      <button class="btn-jouer" id="btn-start">JOUER !</button>
    </div>
  </section>
  <!-- ÉCRAN JEU -->
  <section id="screen-game" class="screen">
    <div class="bg-lines" aria-hidden="true">
      <div class="impact-line"></div><div class="impact-line"></div>
      <div class="impact-line"></div><div class="impact-line"></div>
      <div class="impact-line"></div>
    </div>
    <div class="game-wrap">
      <!-- Question -->
      <div class="iq-top">
        <div class="question-card" id="question-card">
          <div class="question-number" id="q-num">1</div>
          <div class="question-text" id="q-text"></div>
        </div>
      </div>
      <!-- Réponses -->
      <div class="iq-mid">
        <div class="special-zone" id="special-zone" hidden></div>
        <div class="answers-grid" id="answers-grid"></div>
      </div>
      <!-- HUD -->
      <div class="iq-bot">
        <div class="hud-lives" id="hud-lives"></div>
        <button class="btn-ingame-restart" id="btn-ingame-restart" title="Recommencer">↺</button>
        <div class="hud-skips" id="hud-skips"></div>
      </div>
    </div>
  </section>
  <!-- GAME OVER -->
  <div class="overlay" id="overlay-gameover" hidden>
    <div class="overlay-inner overlay-inner--red">
      <h1 class="overlay-title">GAME<br>OVER</h1>
      <p class="overlay-sub">Perdu à la question <strong id="go-qnum">?</strong></p>
      <button class="btn-overlay" id="btn-retry-go">RÉESSAYER</button>
    </div>
  </div>
  <!-- VICTOIRE -->
  <div class="overlay" id="overlay-win" hidden>
    <div class="overlay-inner overlay-inner--gold">
      <h1 class="overlay-title overlay-title--gold">BRAVO !</h1>
      <p class="overlay-sub">Tu as survécu. Même Aizen est impressionné.</p>
      <div class="win-rank" id="win-rank"></div>
      <button class="btn-overlay btn-overlay--gold" id="btn-retry-win">REJOUER</button>
    </div>
  </div>
  <!-- TOASTS -->
  <div class="toast" id="toast">
    <span class="toast-wrong">✗ FAUX !</span>
    <span class="toast-life">−1 VIE</span>
  </div>
  <div class="toast toast--skip" id="toast-skip">
    <span class="toast-skip-text">+1 SKIP ⚡</span>
  </div>
  <script src="questions.js?v=3"></script>
  <script src="script.js?v=3"></script>
</body>
</html>
