<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>That Bleach Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Shrikhand&family=Kalam:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ═══════════════════════════════════
       ÉCRAN TITRE
  ════════════════════════════════════ -->
  <section id="screen-title" class="screen active" aria-label="Écran titre">
    <div class="title-impact-lines" aria-hidden="true">
      <div class="impact-line"></div>
      <div class="impact-line"></div>
      <div class="impact-line"></div>
      <div class="impact-line"></div>
      <div class="impact-line"></div>
    </div>

    <div class="title-content">
      <div class="title-eyebrow">GOTEI 13 ENTERTAINMENT</div>
      <div class="title-logo-wrap">
        <div class="logo-that">THAT</div>
        <div class="logo-bleach">BLEACH</div>
        <div class="logo-quiz">QUIZ</div>
      </div>
      <div class="title-stats">
        <div class="stat-pill"><span class="stat-num">?</span><span class="stat-lbl">QUESTIONS</span></div>
        <div class="stat-pill stat-pill--red"><span class="stat-num">3</span><span class="stat-lbl">VIES</span></div>
        <div class="stat-pill stat-pill--green"><span class="stat-num">5</span><span class="stat-lbl">SKIPS</span></div>
      </div>
      <button class="btn-jouer" id="btn-start">JOUER !</button>
    </div>
  </section>

  <!-- ═══════════════════════════════════
       ÉCRAN JEU
  ════════════════════════════════════ -->
  <section id="screen-game" class="screen" aria-label="Jeu en cours">

    <!-- HUD -->
    <header class="hud" role="status" aria-live="polite">
      <div class="hud-block hud-lives" id="hud-lives" aria-label="Vies restantes"></div>

      <div class="hud-block hud-center">
        <div class="hud-qnum" id="hud-qnum" aria-label="Numéro de question">Q.1</div>
        <div class="hud-progressbar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="hud-progressbar-fill" id="hud-prog"></div>
        </div>
      </div>

      <div class="hud-block hud-right">
        <div class="hud-score" id="hud-score" aria-label="Score">0 PTS</div>
        <div class="hud-skips" id="hud-skips" aria-label="Skips disponibles"></div>
      </div>
    </header>

    <!-- QUESTION -->
    <div class="question-card" id="question-card">
      <div class="question-number" id="q-num" aria-hidden="true">01</div>
      <div class="question-text" id="q-text" role="heading" aria-level="2"></div>
    </div>

    <!-- COMMENTAIRE (affiché après bonne réponse) -->
    <div class="comment-bar" id="comment-bar" aria-live="polite" hidden>
      <span class="comment-icon" aria-hidden="true">💬</span>
      <span class="comment-text" id="comment-text"></span>
    </div>

    <!-- ZONE SPÉCIALE (drag, slider, couleurs, hidden…) -->
    <div class="special-zone" id="special-zone" hidden></div>

    <!-- RÉPONSES CLASSIQUES -->
    <div class="answers-grid" id="answers-grid" role="group" aria-label="Choix de réponses"></div>

  </section>

  <!-- ═══════════════════════════════════
       OVERLAY GAME OVER
  ════════════════════════════════════ -->
  <div class="overlay" id="overlay-gameover" aria-modal="true" role="alertdialog" aria-labelledby="go-title" hidden>
    <div class="overlay-inner overlay-inner--red">
      <div class="overlay-impact" aria-hidden="true"></div>
      <h1 class="overlay-title" id="go-title">GAME<br>OVER</h1>
      <p class="overlay-sub" id="go-sub">Tu t'es arrêté à la question&nbsp;<strong id="go-qnum">?</strong></p>
      <div class="overlay-stats" id="go-stats"></div>
      <button class="btn-overlay" id="btn-retry-go">RÉESSAYER</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════
       OVERLAY VICTOIRE
  ════════════════════════════════════ -->
  <div class="overlay" id="overlay-win" aria-modal="true" role="alertdialog" aria-labelledby="win-title" hidden>
    <div class="overlay-inner overlay-inner--gold">
      <div class="overlay-impact overlay-impact--gold" aria-hidden="true"></div>
      <h1 class="overlay-title overlay-title--gold" id="win-title">BRAVO !</h1>
      <p class="overlay-sub">Tu as survécu. Même Aizen est impressionné.</p>
      <div class="overlay-stats" id="win-stats"></div>
      <div class="win-rank" id="win-rank"></div>
      <button class="btn-overlay btn-overlay--gold" id="btn-retry-win">REJOUER</button>
    </div>
  </div>

  <!-- TOAST MAUVAISE RÉPONSE -->
  <div class="toast" id="toast" aria-live="assertive" aria-atomic="true">
    <span class="toast-wrong">✗ FAUX !</span>
    <span class="toast-life">−1 VIE</span>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
